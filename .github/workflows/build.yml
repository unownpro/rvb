name: Build

on:
  workflow_call:
    inputs:
      config_file:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      config_file:
        description: "Select the config file to use"
        required: true
        type: choice
        default: ".github/build/config.manual.toml"
        options:
          - ".github/build/config.manual.toml"
          - ".github/build/config.dev.updated.json"
          - ".github/build/config.stable.updated.json"

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Resolve build context
        id: context
        run: |
          set -euo pipefail
          CONFIG="${{ inputs.config_file }}"

          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file not found: $CONFIG"
            exit 1
          fi
          
          echo "CONFIG_FILE=$CONFIG" >> "$GITHUB_OUTPUT"

          IS_DEV=false
          if [[ "$CONFIG" == *"dev"* ]]; then
            IS_DEV=true
          elif [[ "$CONFIG" == *.json ]]; then
            if [ "$(jq -r '."patches-version" // empty' "$CONFIG")" = "dev" ]; then
              IS_DEV=true
            fi
          elif [[ "$CONFIG" == *.toml ]]; then
            if awk '/^\[/ {exit} {print}' "$CONFIG" | grep -qE '^[[:space:]]*patches-version[[:space:]]*=[[:space:]]*"?dev"?'; then
              IS_DEV=true
            fi
          fi

          if [ "$IS_DEV" = true ]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
            echo "TG_THREAD_ID=350" >> "$GITHUB_OUTPUT"
            echo "TITLE_SUFFIX= (Pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
            echo "TG_THREAD_ID=262" >> "$GITHUB_OUTPUT"
            echo "TITLE_SUFFIX=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version code
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$( { gh release list --exclude-drafts -L 100 2>/dev/null || true; } | awk -F '\t' '$3 ~ /^[0-9]+$/ {print $3}' | sort -nr | head -n1 )
          if [ -z "$TAG" ] || ! [[ "$TAG" =~ ^[0-9]+$ ]]; then TAG=0; fi
          echo "NEXT_VER_CODE=$((TAG + 1))" >> "$GITHUB_OUTPUT"

      - name: Build modules and apks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
        run: |
          set -euo pipefail
          sed -i '/Install \[Microg\]/,$d' build.sh
          
          cat << 'EOF' >> build.sh
          log "\n**Notes:**"
          log "• Install [MicroG-RE](https://github.com/MorpheApp/MicroG-RE/releases/latest) or [MicroG](https://github.com/ReVanced/GmsCore/releases/latest), required for Google APKs."
          log "• Use [Zygisk Detach](https://github.com/j-hc/zygisk-detach) to stop Play Store from updating Modules."
          log "\n[GitHub](https://github.com/nullcpy/rvb) | [Group Chat](https://t.me/rvb27) | [Channel](https://t.me/rvb28) | [Website](https://nullcpy.github.io)\n"
          
          changelog_merged=$(cat "$TEMP_DIR"/*/changelog.md 2>/dev/null || :)
          changelog_merged=$(awk '
          {
          	line=$0
          	if (line ~ /^CLI: /) {
          		key=line
          		sub(/\r$/, "", key)
          		gsub(/[[:space:]]+$/, "", key)
          		if (seen[key]++) next
          	}
          	print line
          }' <<<"$changelog_merged")
          log "$changelog_merged"

          SKIPPED=$(cat "$TEMP_DIR"/skipped 2>/dev/null || :)
          if [ -n "$SKIPPED" ]; then
          	log "\nSkipped:"
          	log "$SKIPPED"
          fi

          pr "Done"
          EOF

          cat << 'EOF' >> utils.sh
          
          dl_archive() {
          	local url=$1 version=$2 output=$3 arch=$4
          	local path version=${version// /}
          	while IFS= read -r p; do
          		case "$p" in
          			*"${version_f#v}-${arch// /}.apk"|*"${version_f#v}-${arch// /}.apkm"|*"${version_f#v}-${arch// /}.xapk"|*"${version_f#v}-${arch// /}.apks")
          				path="$p"
          				break
          				;;
          		esac
          	done <<<"$__ARCHIVE_RESP__"
          	if [ -z "$path" ]; then
          		epr "Version ${version} with arch ${arch} not found in archive"
          		return 1
          	fi
          	case "${path##*.}" in
          		apk)
          			req "${url}/${path}" "$output"
          			;;
          		apkm|xapk|apks)
          			req "${url}/${path}" "${output}.${path##*.}" || return 1
          			merge_splits "${output}.${path##*.}" "${output}"
          			;;
          		*)
          			epr "Unsupported archive file type for ${path}"
          			return 1
          			;;
          	esac
          }

          get_archive_vers() { sed 's/^[^-]*-//;s/-\(all\|arm64-v8a\|arm-v7a\|x86\|x86_64\)\.\(apk\|apkm\|xapk\|apks\)$//g' <<<"$__ARCHIVE_RESP__"; }
          EOF

          ./build.sh "${{ steps.context.outputs.CONFIG_FILE }}"

      - name: Get output
        id: get_output
        run: |
          set -euo pipefail
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          cat build.md >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          cp -f build.md build.tmp

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./build/*
          file_glob: true
          release_name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}
          tag: ${{ steps.version.outputs.NEXT_VER_CODE }}
          overwrite: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}

      - name: Update changelog and module update files
        run: |
          set -euo pipefail
          git checkout -f update || git switch --discard-changes --orphan update
          cp -f build.tmp build.md

          get_update_json() {
            echo "{
            \"version\": \"$1\",
            \"versionCode\": ${{ steps.version.outputs.NEXT_VER_CODE }},
            \"zipUrl\": \"$2\",
            \"changelog\": \"https://raw.githubusercontent.com/$GITHUB_REPOSITORY/update/build.md\"
          }"
          }

          cd build || { echo "build folder not found"; exit 1; }
          for OUTPUT in *module*.zip; do
            [ "$OUTPUT" = "*module*.zip" ] && continue
            ZIP_S=$(unzip -p "$OUTPUT" module.prop)
            if ! UPDATE_JSON=$(echo "$ZIP_S" | grep updateJson); then continue; fi
            UPDATE_JSON="${UPDATE_JSON##*/}"
            VER=$(echo "$ZIP_S" | grep version=)
            VER="${VER##*=}"
            DLURL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.version.outputs.NEXT_VER_CODE }}/${OUTPUT}"
            get_update_json "$VER" "$DLURL" >"../$UPDATE_JSON"
          done
          cd ..

      - name: Commit updated build and module update files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          skip_checkout: true
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.version.outputs.NEXT_VER_CODE }}

      - name: Notify telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_THREAD_ID: ${{ steps.context.outputs.TG_THREAD_ID }}
          TITLE_SUFFIX: ${{ steps.context.outputs.TITLE_SUFFIX }}
        run: |
          set -euo pipefail
          cd build || { echo "build folder not found"; exit 1; }

          TG_CHAT="@rvb27"
          TG_CHANNEL="@rvb28"

          NL=$'\n'
          APKS=""
          MODULES=""
          HAS_MODULES=false

          shopt -s nullglob
          for OUTPUT in *; do
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.version.outputs.NEXT_VER_CODE }}/${OUTPUT}"
            if [[ $OUTPUT = *.apk ]]; then
              APKS+="${NL}${NL}[${OUTPUT}](${DL_URL})"
            elif [[ $OUTPUT = *.zip ]]; then
              MODULES+="${NL}${NL}[${OUTPUT}](${DL_URL})"
              HAS_MODULES=true
            fi
          done
          shopt -u nullglob

          MODULES=${MODULES#"$NL"}
          APKS=${APKS#"$NL"}

          BODY="$(sed 's/^\* \*\*/↪ \*\*/g; s/^\* `/↪ \*\*/g; s/`/\*/g; s/^\* /\↪/g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../build.tmp)"

          MSG="*Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}*${TITLE_SUFFIX}${NL}${NL}${BODY}${NL}${NL}"
            
          if [ "$HAS_MODULES" = true ]; then
            MSG+="*Modules:*${MODULES}${NL}${NL}"
          fi

          MSG+="*APKs:*${APKS}"
          MSG=${MSG:0:9450}

          curl -s -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${TG_THREAD_ID}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" &

          curl -s -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHANNEL}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" &

          wait
