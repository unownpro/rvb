name: Telegram Repo Activity

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

  pull_request:
    types: [opened, closed, reopened]

  issues:
    types: [opened, closed]

  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      TG_CHAT: "@rvb27"
      TG_THREAD_ID: "267"
      TG_TOKEN: ${{ secrets.TG_TOKEN }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build message
        id: build
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          TEXT=""

          # ---------------------------
          # WORKFLOW FAILURE
          # ---------------------------
          if [ "$EVENT" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" = "failure" ]; then
            NAME="${{ github.event.workflow_run.name }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
            COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
            URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

            TEXT="❌ <b>Workflow Failed</b>
            <b>${NAME}</b>
            <b>Branch:</b> ${BRANCH}
            <b>By:</b> ${ACTOR}
            
            <b>Commit:</b>
            <code>${COMMIT_MSG}</code>
            
            🔗 <a href='${URL}'>View Run</a>"
                      fi
            
                      # ---------------------------
                      # PUSH (collapse if >5 commits)
                      # ---------------------------
                      if [ "$EVENT" = "push" ]; then
                        BRANCH="${{ github.ref_name }}"
                        COMPARE_URL="${{ github.event.compare }}"
            
                        COUNT=$(jq '.commits | length' "$GITHUB_EVENT_PATH")
            
                        if [ "$COUNT" -le 5 ]; then
                          COMMITS=$(jq -r '.commits[] | "• \(.message | split("\n")[0]) — \(.author.name)"' "$GITHUB_EVENT_PATH")
                        else
                          FIRST5=$(jq -r '.commits[0:5][] | "• \(.message | split("\n")[0])"' "$GITHUB_EVENT_PATH")
                          COMMITS="${FIRST5}
            ...
            (+$(($COUNT - 5)) more commits)"
                        fi
            
                        TEXT="📦 <b>Push to ${BRANCH}</b>
            <b>By:</b> ${ACTOR}
            <b>Total commits:</b> ${COUNT}
            
            <b>Commits:</b>
            ${COMMITS}
            
            🔗 <a href='${COMPARE_URL}'>View Push</a>"
                      fi

          # ---------------------------
          # PULL REQUEST
          # ---------------------------
          if [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            ACTION="${{ github.event.action }}"

            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              EMOJI="🟣"
              ACTION="merged"
            else
              EMOJI="🔀"
            fi

            TEXT="${EMOJI} <b>PR ${ACTION}</b>
            <b>${TITLE}</b>
            <b>By:</b> ${ACTOR}
            
            🔗 <a href='${URL}'>View PR</a>"
                      fi

          # ---------------------------
          # ISSUES
          # ---------------------------
          if [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            ACTION="${{ github.event.action }}"

            TEXT="🐞 <b>Issue ${ACTION}</b>
            <b>${TITLE}</b>
            <b>By:</b> ${ACTOR}
            
            🔗 <a href='${URL}'>View Issue</a>"
                      fi
            
                      echo "text<<EOF" >> $GITHUB_OUTPUT
                      echo "$TEXT" >> $GITHUB_OUTPUT
                      echo "EOF" >> $GITHUB_OUTPUT
            
          - name: Send to Telegram
            if: steps.build.outputs.text != ''
            run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d message_thread_id="${TG_THREAD_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=${{ steps.build.outputs.text }}"
