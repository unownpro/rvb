name: Notify Repo Activity

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

  pull_request:
    types: [opened, closed, reopened]

  issues:
    types: [opened, closed]

  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      TG_CHAT: "@rvb27"
      TG_THREAD_ID: "2111"
      TG_TOKEN: ${{ secrets.TG_TOKEN }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build message
        id: build
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          TEXT=""

          # ---------------------------
          # WORKFLOW FAILURE OR JOB FAILURE
          # ---------------------------
          if [ "$EVENT" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" != "success" ] && [ "${{ github.event.workflow_run.conclusion }}" != "skipped" ]; then
            NAME="${{ github.event.workflow_run.name }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
            COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
            URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

            TEXT="❌ *Workflow Failed*
            *${NAME}*
            *Branch:* ${BRANCH}
            *By:* ${ACTOR}

            *Commit:*
            \`${COMMIT_MSG}\`

            🔗 [View Run](${URL})"
          fi

          # ---------------------------
          # PUSH (collapse if >5 commits)
          # ---------------------------
          if [ "$EVENT" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            COMPARE_URL="${{ github.event.compare }}"

            COUNT=$(jq '.commits | length' "$GITHUB_EVENT_PATH")

            if [ "$COUNT" -le 5 ]; then
              COMMITS=$(jq -r '.commits[] | "• \(.message | split("\n")[0]) — \(.author.name)"' "$GITHUB_EVENT_PATH")
            else
              FIRST5=$(jq -r '.commits[0:5][] | "• \(.message | split("\n")[0])"' "$GITHUB_EVENT_PATH")
              COMMITS="${FIRST5}
            ...
            (+$(($COUNT - 5)) more commits)"
            fi

            TEXT="📦 *Push to ${BRANCH}*
            *By:* ${ACTOR}
            *Total commits:* ${COUNT}

            *Commits:*
            ${COMMITS}

            🔗 [View Push](${COMPARE_URL})"
          fi

          # ---------------------------
          # PULL REQUEST
          # ---------------------------
          if [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            ACTION="${{ github.event.action }}"

            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              EMOJI="🟣"
              ACTION="merged"
            else
              EMOJI="🔀"
            fi

            TEXT="${EMOJI} *PR ${ACTION}*
            *${TITLE}*
            *By:* ${ACTOR}

            🔗 [View PR](${URL})"
            fi

          # ---------------------------
          # ISSUES
          # ---------------------------
          if [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            ACTION="${{ github.event.action }}"

            TEXT="🐞 *Issue ${ACTION}*
            *${TITLE}*
            *By:* ${ACTOR}

            🔗 [View Issue](${URL})"
          fi

          # ---------------------------
          # Write to GitHub output safely
          # ---------------------------
          {
            echo "text<<EOF"
            echo "$TEXT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send to Telegram
        if: steps.build.outputs.text != ''
        run: |
          MSG="${{ steps.build.outputs.text }}"
          MSG=${MSG:0:9450}

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${TG_THREAD_ID}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"
