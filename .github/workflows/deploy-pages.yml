name: Deploy Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: [build]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            let md = fs.readFileSync('README.md', 'utf8');

            // Fix relative GitHub links to absolute URLs
            const repoUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}`;
            md = md.replace(/\.\.\/\.\.\/releases\//g, `${repoUrl}/releases/`);
            md = md.replace(/\.\//g, `${repoUrl}/blob/${process.env.GITHUB_REF_NAME}/`);

            // Render markdown to HTML
            const { data: body } = await github.rest.markdown.render({
              text: md,
              mode: 'gfm',
              context: process.env.GITHUB_REPOSITORY
            });

            // Inject proper HTML5 structure + GitHub's markdown CSS
            const html = `<!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${process.env.GITHUB_REPOSITORY} Downloads</title>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
              <style>
                .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
                @media (max-width: 767px) { .markdown-body { padding: 15px; } }
                img { max-width: 100%; height: auto; }
              </style>
            </head>
            <body>
              <article class="markdown-body">
                ${body}
              </article>
            </body>
            </html>`;

            fs.mkdirSync('public', { recursive: true });
            fs.writeFileSync('public/index.html', html, 'utf8');

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4