name: Check Patch & Build

on:
  schedule:
    - cron: "20 */1 * * *" # Every 1 hours
  workflow_dispatch:

env:
  TG_CHAT: "@rvb27"
  TG_CHANNEL: "@rvb28"

concurrency:
  group: patch-build
  cancel-in-progress: false

jobs:
  check:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      trigger_stable: ${{ steps.compare.outputs.TRIGGER_STABLE }}
      trigger_prerelease: ${{ steps.compare.outputs.TRIGGER_PRERELEASE }}
      next_stable_ver: ${{ steps.versions.outputs.next_stable_ver }}
      next_dev_ver: ${{ steps.versions.outputs.next_dev_ver }}
    steps:
      - name: Checkout (Main)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Ensure patch_sources.json exists
        id: ensure_patch_sources
        run: |
          set -euo pipefail
          mkdir -p .github/build
          PATCH_FILE=".github/build/patch_sources.json"

          if [ ! -f "$PATCH_FILE" ]; then
            cat > "$PATCH_FILE" << 'EOF'
          {
            "patch": { "repo": "", "stable": "", "prerelease": "" }
          }
          EOF
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dummy patch_sources.json if created
        if: steps.ensure_patch_sources.outputs.created == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          skip_checkout: true
          file_pattern: .github/build/patch_sources.json
          commit_message: "Create dummy patch_sources.json"

      - name: Fetch Latest Tags (from patch source files)
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: fetch_tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PATCH_FILE=".github/build/patch_sources.json"

          BASE_JSON=$(cat "$PATCH_FILE")

          if echo "$BASE_JSON" | jq -e 'length == 0' >/dev/null; then
            DELIM="$(openssl rand -hex 8)"
            echo "latest<<${DELIM}" >> "$GITHUB_OUTPUT"
            echo "$BASE_JSON" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          fi

          get_latest_tags_pair() {
            local repo=$1
            local resp status body stable pre

            resp=$(curl -sS -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/releases" || true)

            status="${resp: -3}"
            body="${resp::-3}"

            if [ "$status" != "200" ]; then
              echo "|"
              return 0
            fi

            stable=$(printf '%s\n' "$body" | jq -r '
              map(select(.prerelease == false and .tag_name != null and .tag_name != ""))
              | sort_by(.published_at)
              | reverse
              | .[0].tag_name // ""
            ')

            pre=$(printf '%s\n' "$body" | jq -r '
              map(select(.prerelease == true and .tag_name != null and .tag_name != ""))
              | sort_by(.published_at)
              | reverse
              | .[0].tag_name // ""
            ')

            echo "${stable}|${pre}"
          }

          NEW_JSON="$BASE_JSON"

          while read -r id repo; do
            tags_pair=$(get_latest_tags_pair "$repo")
            stable="${tags_pair%%|*}"
            pre="${tags_pair#*|}"

            NEW_JSON=$(jq \
              --arg id "$id" \
              --arg stable "$stable" \
              --arg pre "$pre" \
              '.[$id].stable = $stable | .[$id].prerelease = $pre' \
              <<<"$NEW_JSON")
          done < <(echo "$BASE_JSON" | jq -r 'to_entries[] | select(.value.repo != "") | "\(.key) \(.value.repo)"')

          DELIM="$(openssl rand -hex 8)"
          echo "latest<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$NEW_JSON" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Compare Latest vs Stored Tags
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: compare
        run: |
          set -euo pipefail
          PATCH_FILE=".github/build/patch_sources.json"

          OLD_JSON=$(cat "$PATCH_FILE")
          NEW_JSON='${{ steps.fetch_tags.outputs.latest }}'

          if [ -z "$NEW_JSON" ]; then
            NEW_JSON="{}"
          fi

          TRIGGER_STABLE=$(jq -n --argjson old "$OLD_JSON" --argjson new "$NEW_JSON" '
            [ $new | to_entries[] | . as $e
              | ($old[$e.key] // {}) as $o
              | select($e.value.stable != "" and $e.value.stable != ($o.stable // ""))
            ] | if length > 0 then 1 else 0 end
          ')

          TRIGGER_PRERELEASE=$(jq -n --argjson old "$OLD_JSON" --argjson new "$NEW_JSON" '
            [ $new | to_entries[] | . as $e
              | ($old[$e.key] // {}) as $o
              | select($e.value.prerelease != "" and $e.value.prerelease != ($o.prerelease // ""))
            ] | if length > 0 then 1 else 0 end
          ')

          echo "$NEW_JSON" > "$PATCH_FILE"

          echo "TRIGGER_STABLE=$TRIGGER_STABLE" >> "$GITHUB_OUTPUT"
          echo "TRIGGER_PRERELEASE=$TRIGGER_PRERELEASE" >> "$GITHUB_OUTPUT"

          DELIM1="$(openssl rand -hex 8)"
          echo "tags_old<<${DELIM1}" >> "$GITHUB_OUTPUT"
          echo "$OLD_JSON" >> "$GITHUB_OUTPUT"
          echo "${DELIM1}" >> "$GITHUB_OUTPUT"

          DELIM2="$(openssl rand -hex 8)"
          echo "tags_new<<${DELIM2}" >> "$GITHUB_OUTPUT"
          echo "$NEW_JSON" >> "$GITHUB_OUTPUT"
          echo "${DELIM2}" >> "$GITHUB_OUTPUT"

      - name: Generate Configs (Stable and Dev)
        if: steps.compare.outputs.TRIGGER_STABLE == '1' || steps.compare.outputs.TRIGGER_PRERELEASE == '1'
        id: generate_configs
        env:
          TAGS_OLD: ${{ steps.compare.outputs.tags_old }}
          TAGS_NEW: ${{ steps.compare.outputs.tags_new }}
        run: |
          set -euo pipefail
          BASE_CONFIG="config.toml"
          BASE_CONFIG_STABLE=".github/build/config.stable.toml"
          BASE_CONFIG_DEV=".github/build/config.dev.toml"

          [ -n "${TAGS_OLD:-}" ] || TAGS_OLD='{}'
          [ -n "${TAGS_NEW:-}" ] || TAGS_NEW='{}'

          jq -rn --argjson new "$TAGS_NEW" --argjson old "$TAGS_OLD" '
            [ $new | to_entries[] | . as $e
                | ($old[$e.key] // {}) as $o
                | select($e.value.stable != "" and $e.value.stable != ($o.stable // ""))
                | $e.value.repo
            ] | .[]
          ' > .github/build/active.stable.txt || true

          jq -rn --argjson new "$TAGS_NEW" --argjson old "$TAGS_OLD" '
            [ $new | to_entries[] | . as $e
                | ($old[$e.key] // {}) as $o
                | select($e.value.prerelease != "" and $e.value.prerelease != ($o.prerelease // ""))
                | $e.value.repo
            ] | .[]
          ' > .github/build/active.prerelease.txt || true

          generate_config() {
            local mode="$1"
            local out_file=".github/build/config.$mode.updated.toml"

            if [ "$mode" = "stable" ] && [ -f "$BASE_CONFIG" ] && [ -f "$BASE_CONFIG_STABLE" ]; then
              {
                cat "$BASE_CONFIG"
                echo
                cat "$BASE_CONFIG_STABLE"
              } > "$out_file"
            elif [ "$mode" = "stable" ] && [ -f "$BASE_CONFIG_STABLE" ]; then
              cp "$BASE_CONFIG_STABLE" "$out_file"
            elif [ "$mode" = "dev" ] && [ -f "$BASE_CONFIG" ] && [ -f "$BASE_CONFIG_DEV" ]; then
              {
                cat "$BASE_CONFIG"
                echo
                cat "$BASE_CONFIG_DEV"
              } > "$out_file"
            elif [ "$mode" = "dev" ] && [ -f "$BASE_CONFIG_DEV" ]; then
              cp "$BASE_CONFIG_DEV" "$out_file"
            else
              cp "$BASE_CONFIG" "$out_file"
            fi

            if [ "$mode" = "stable" ]; then
              {
                echo 'parallel-jobs = 1'
                echo 'enable-module-update = true'
                echo
                cat "$out_file"
              } > tmp_header
              mv tmp_header "$out_file"
            else
              {
                echo 'parallel-jobs = 1'
                echo 'patches-version = "dev"'
                echo 'cli-version = "dev"'
                echo 'enable-module-update = false'
                echo
                cat "$out_file"
              } > tmp_header
              mv tmp_header "$out_file"
            fi

            local active_file
            if [ "$mode" = "stable" ]; then
              active_file=".github/build/active.stable.txt"
            else
              active_file=".github/build/active.prerelease.txt"
            fi

            touch "$active_file"

            awk -v active_file="$active_file" '
              BEGIN {
                while ((getline repo < active_file) > 0) {
                  if (repo != "") active[repo] = 1
                }
                close(active_file)
                keep = 0
              }
              /^\[.*\]/ {
                flush_section()
                delete lines
                n = 0
                lines[n++] = $0
                keep = 0
                next
              }
              {
                lines[n++] = $0
                if ($0 ~ /patches-source *= *"[^"]+"/) {
                  match($0, /patches-source *= *"([^"]+)"/, m)
                  src = m[1]
                  if (src in active) {
                    keep = 1
                  }
                }
                next
              }
              END {
                flush_section()
              }
              function flush_section() {
                if (n == 0) return
                for (i = 0; i < n; i++) {
                  line = lines[i]
                  if (!keep) {
                    gsub(/enabled *= *true/, "enabled = false", line)
                  }
                  print line
                }
              }
            ' "$out_file" > tmp && mv tmp "$out_file"
          }

          if [ "${{ steps.compare.outputs.TRIGGER_STABLE }}" = "1" ]; then
            generate_config "stable"
          fi

          if [ "${{ steps.compare.outputs.TRIGGER_PRERELEASE }}" = "1" ]; then
            generate_config "dev"
          fi

      - name: Commit Updated patch sources and configs
        if: steps.ensure_patch_sources.outputs.created == 'false' && (steps.compare.outputs.TRIGGER_STABLE == '1' || steps.compare.outputs.TRIGGER_PRERELEASE == '1')
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          skip_checkout: true
          file_pattern: .github/build/patch_sources.json .github/build/config.stable.updated.toml .github/build/config.dev.updated.toml
          commit_message: "Update patch sources and generated configs"

      - name: Generate Version Numbers (Stable and Dev)
        if: steps.compare.outputs.TRIGGER_STABLE == '1' || steps.compare.outputs.TRIGGER_PRERELEASE == '1'
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER_STABLE: ${{ steps.compare.outputs.TRIGGER_STABLE }}
          TRIGGER_PRERELEASE: ${{ steps.compare.outputs.TRIGGER_PRERELEASE }}
        run: |
          set -euo pipefail

          TAG=$(gh release list --exclude-drafts -L 100 | awk -F '\t' '$3 ~ /^[0-9]+$/ {print $3}' | sort -nr | head -n1)
          if [ -z "$TAG" ] || ! [[ "$TAG" =~ ^[0-9]+$ ]]; then TAG=0; fi

          TRIGGER_STABLE=${TRIGGER_STABLE:-0}
          TRIGGER_PRERELEASE=${TRIGGER_PRERELEASE:-0}

          NEXT_STABLE=""
          NEXT_DEV=""

          if [ "$TRIGGER_STABLE" = "1" ] && [ "$TRIGGER_PRERELEASE" = "1" ]; then
            NEXT_STABLE=$((TAG + 2))
            NEXT_DEV=$((TAG + 1))
          elif [ "$TRIGGER_STABLE" = "1" ]; then
            NEXT_STABLE=$((TAG + 1))
          elif [ "$TRIGGER_PRERELEASE" = "1" ]; then
            NEXT_DEV=$((TAG + 1))
          fi

          echo "next_stable_ver=${NEXT_STABLE}" >> "$GITHUB_OUTPUT"
          echo "next_dev_ver=${NEXT_DEV}" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.trigger_prerelease == '1' || needs.check.outputs.trigger_stable == '1'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        mode: [dev, stable]

    steps:
      - name: Resolve Build Params
        id: params
        run: |
          set -euo pipefail
          if [ "${{ matrix.mode }}" = "dev" ]; then
            if [ "${{ needs.check.outputs.trigger_prerelease }}" = "1" ]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "config_file=.github/build/config.dev.updated.toml" >> "$GITHUB_OUTPUT"
              echo "version=${{ needs.check.outputs.next_dev_ver }}" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "thread_id=350" >> "$GITHUB_OUTPUT"
              echo "title_suffix= (Pre-release)" >> "$GITHUB_OUTPUT"
              echo "tmp_file=build.dev.tmp" >> "$GITHUB_OUTPUT"
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ "${{ needs.check.outputs.trigger_stable }}" = "1" ]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "config_file=.github/build/config.stable.updated.toml" >> "$GITHUB_OUTPUT"
              echo "version=${{ needs.check.outputs.next_stable_ver }}" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "thread_id=262" >> "$GITHUB_OUTPUT"
              echo "title_suffix=" >> "$GITHUB_OUTPUT"
              echo "tmp_file=build.stable.tmp" >> "$GITHUB_OUTPUT"
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout (Main)
        if: steps.params.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Setup Java
        if: steps.params.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Modules and APKs
        if: steps.params.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p build
          ./build.sh "${{ steps.params.outputs.config_file }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
          NEXT_VER_CODE: ${{ steps.params.outputs.version }}

      - name: Get Output
        id: get_output
        if: steps.params.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          cat build.md >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          cp -f build.md "${{ steps.params.outputs.tmp_file }}"

      - name: Upload to Release
        if: steps.params.outputs.enabled == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./build/*
          file_glob: true
          release_name: Build No. ${{ steps.params.outputs.version }}
          tag: ${{ steps.params.outputs.version }}
          prerelease: ${{ steps.params.outputs.prerelease }}
          overwrite: true

      - name: Update Changelog and Magisk Update JSON
        if: steps.params.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          git checkout -f update || git switch --discard-changes --orphan update
          cp -f "${{ steps.params.outputs.tmp_file }}" build.md

          get_update_json() {
            echo "{
            \"version\": \"$1\",
            \"versionCode\": ${{ steps.params.outputs.version }},
            \"zipUrl\": \"$2\",
            \"changelog\": \"https://raw.githubusercontent.com/$GITHUB_REPOSITORY/update/build.md\"
          }"
          }

          cd build || { echo "build folder not found"; exit 1; }
          for OUTPUT in *module*.zip; do
            [ "$OUTPUT" = "*module*.zip" ] && continue
            ZIP_S=$(unzip -p "$OUTPUT" module.prop)
            if ! UPDATE_JSON=$(echo "$ZIP_S" | grep updateJson); then continue; fi
            UPDATE_JSON="${UPDATE_JSON##*/}"
            VER=$(echo "$ZIP_S" | grep version=)
            VER="${VER##*=}"
            DLURL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params.outputs.version }}/${OUTPUT}"
            get_update_json "$VER" "$DLURL" >"../$UPDATE_JSON"
          done

          cd ..
          find . -maxdepth 1 -name "*-update.json" | grep . || : > dummy-update.json

      - name: Commit Updated Build MD and Update JSON Files
        if: steps.params.outputs.enabled == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          skip_checkout: true
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.params.outputs.version }}

      - name: Notify Telegram (Build Complete)
        if: steps.params.outputs.enabled == 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          set -euo pipefail
          cd build || exit 1

          NL=$'\n'
          APKS=""
          MODULES=""
          HAS_MODULES=false

          for OUTPUT in *; do
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params.outputs.version }}/${OUTPUT}"
            if [[ $OUTPUT = *.apk ]]; then
              APKS+="${NL}${NL}[${OUTPUT}](${DL_URL})"
            elif [[ $OUTPUT = *.zip ]]; then
              MODULES+="${NL}${NL}[${OUTPUT}](${DL_URL})"
              HAS_MODULES=true
            fi
          done

          MODULES=${MODULES#"$NL"}
          APKS=${APKS#"$NL"}

          BODY="$(sed 's/^\* \*\*/↪ \*\*/g; s/^\* `/↪ \*\*/g; s/`/\*/g; s/^\* /\↪/g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../${{ steps.params.outputs.tmp_file }})"

          MSG="*Build No. ${{ steps.params.outputs.version }}*${{ steps.params.outputs.title_suffix }}${NL}${NL}${BODY}${NL}${NL}"

          if [ "$HAS_MODULES" = true ]; then
            MSG+="*Modules:*${MODULES}${NL}${NL}"
          fi

          MSG+="*APKs:*${APKS}"
          MSG=${MSG:0:9450}

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${{ steps.params.outputs.thread_id }}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"

          sleep 1

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHANNEL}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"
