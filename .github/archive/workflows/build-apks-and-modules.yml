name: Build APKs and Modules

on:
  workflow_call:
    inputs:
      trigger_stable:
        required: true
        type: string
      trigger_prerelease:
        required: true
        type: string
      next_stable_ver:
        required: true
        type: string
      next_dev_ver:
        required: true
        type: string

env:
  TG_CHAT: "@rvb27"
  TG_CHANNEL: "@rvb28"

jobs:
  build:
    if: inputs.trigger_prerelease == '1' || inputs.trigger_stable == '1'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout (Main)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Resolve Dev Params
        id: params_dev
        run: |
          set -euo pipefail
          if [ "${{ inputs.trigger_prerelease }}" = "1" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "config_file=.github/build/config.dev.updated.toml" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.next_dev_ver }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "thread_id=350" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Modules and APKs (Dev)
        id: build_dev
        if: steps.params_dev.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p build
          ./build.sh "${{ steps.params_dev.outputs.config_file }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
          NEXT_VER_CODE: ${{ steps.params_dev.outputs.version }}

      - name: Get Output (Dev)
        if: steps.params_dev.outputs.enabled == 'true' && steps.build_dev.outcome == 'success'
        id: get_output_dev
        run: |
          set -euo pipefail
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          cat build.md >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          cp -f build.md build.dev.tmp

      - name: Upload to Release (Dev)
        if: steps.params_dev.outputs.enabled == 'true' && steps.build_dev.outcome == 'success'
        uses: svenstaro/upload-release-action@v2
        with:
          body: ${{ steps.get_output_dev.outputs.BUILD_LOG }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./build/*
          file_glob: true
          release_name: Build No. ${{ steps.params_dev.outputs.version }}
          tag: ${{ steps.params_dev.outputs.version }}
          prerelease: ${{ steps.params_dev.outputs.prerelease }}
          overwrite: true

      - name: Update Changelog and Magisk Update JSON (Dev)
        if: steps.params_dev.outputs.enabled == 'true' && steps.build_dev.outcome == 'success'
        run: |
          set -euo pipefail

          git checkout -f update || git switch --discard-changes --orphan update
          cp -f build.dev.tmp build.md

          get_update_json() {
            echo "{
            \"version\": \"$1\",
            \"versionCode\": ${{ steps.params_dev.outputs.version }},
            \"zipUrl\": \"$2\",
            \"changelog\": \"https://raw.githubusercontent.com/$GITHUB_REPOSITORY/update/build.md\"
          }"
          }

          cd build || { echo "build folder not found"; exit 1; }
          for OUTPUT in *module*.zip; do
            [ "$OUTPUT" = "*module*.zip" ] && continue
            ZIP_S=$(unzip -p "$OUTPUT" module.prop)
            if ! UPDATE_JSON=$(echo "$ZIP_S" | grep updateJson); then continue; fi
            UPDATE_JSON="${UPDATE_JSON##*/}"
            VER=$(echo "$ZIP_S" | grep version=)
            VER="${VER##*=}"
            DLURL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params_dev.outputs.version }}/${OUTPUT}"
            get_update_json "$VER" "$DLURL" >"../$UPDATE_JSON"
          done

          cd ..
          find . -maxdepth 1 -name "*-update.json" | grep . || : > dummy-update.json

      - name: Commit Updated Build MD and Update JSON Files (Dev)
        if: steps.params_dev.outputs.enabled == 'true' && steps.build_dev.outcome == 'success'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          skip_checkout: true
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.params_dev.outputs.version }}

      - name: Notify Telegram (Dev Build Complete)
        if: steps.params_dev.outputs.enabled == 'true' && steps.build_dev.outcome == 'success'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          set -euo pipefail
          cd build || exit 1

          NL=$'\n'
          APKS=""
          MODULES=""
          HAS_MODULES=false

          for OUTPUT in *; do
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params_dev.outputs.version }}/${OUTPUT}"
            if [[ $OUTPUT = *.apk ]]; then
              APKS+="${NL}${NL}[${OUTPUT}](${DL_URL})"
            elif [[ $OUTPUT = *.zip ]]; then
              MODULES+="${NL}${NL}[${OUTPUT}](${DL_URL})"
              HAS_MODULES=true
            fi
          done

          MODULES=${MODULES#"$NL"}
          APKS=${APKS#"$NL"}

          BODY="$(sed 's/^\* \*\*/↪ \*\*/g; s/^\* `/↪ \*\*/g; s/`/\*/g; s/^\* /\↪/g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../build.dev.tmp)"

          MSG="*Build No. ${{ steps.params_dev.outputs.version }}* (Pre-release)${NL}${NL}${BODY}${NL}${NL}"

          if [ "$HAS_MODULES" = true ]; then
            MSG+="*Modules:*${MODULES}${NL}${NL}"
          fi

          MSG+="*APKs:*${APKS}"
          MSG=${MSG:0:9450}

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${{ steps.params_dev.outputs.thread_id }}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"

          sleep 1

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHANNEL}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"

      - name: Resolve Stable Params
        id: params_stable
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ inputs.trigger_stable }}" = "1" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "config_file=.github/build/config.stable.updated.toml" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.next_stable_ver }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "thread_id=262" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Modules and APKs (Stable)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git checkout -f main
          rm -rf build
          mkdir -p build
          ./build.sh "${{ steps.params_stable.outputs.config_file }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
          NEXT_VER_CODE: ${{ steps.params_stable.outputs.version }}

      - name: Get Output (Stable)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        id: get_output_stable
        run: |
          set -euo pipefail
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          cat build.md >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          cp -f build.md build.stable.tmp

      - name: Upload to Release (Stable)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          body: ${{ steps.get_output_stable.outputs.BUILD_LOG }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./build/*
          file_glob: true
          release_name: Build No. ${{ steps.params_stable.outputs.version }}
          tag: ${{ steps.params_stable.outputs.version }}
          prerelease: ${{ steps.params_stable.outputs.prerelease }}
          overwrite: true

      - name: Update Changelog and Magisk Update JSON (Stable)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          git checkout -f update || git switch --discard-changes --orphan update
          cp -f build.stable.tmp build.md

          get_update_json() {
            echo "{
            \"version\": \"$1\",
            \"versionCode\": ${{ steps.params_stable.outputs.version }},
            \"zipUrl\": \"$2\",
            \"changelog\": \"https://raw.githubusercontent.com/$GITHUB_REPOSITORY/update/build.md\"
          }"
          }

          cd build || { echo "build folder not found"; exit 1; }
          for OUTPUT in *module*.zip; do
            [ "$OUTPUT" = "*module*.zip" ] && continue
            ZIP_S=$(unzip -p "$OUTPUT" module.prop)
            if ! UPDATE_JSON=$(echo "$ZIP_S" | grep updateJson); then continue; fi
            UPDATE_JSON="${UPDATE_JSON##*/}"
            VER=$(echo "$ZIP_S" | grep version=)
            VER="${VER##*=}"
            DLURL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params_stable.outputs.version }}/${OUTPUT}"
            get_update_json "$VER" "$DLURL" >"../$UPDATE_JSON"
          done

          cd ..
          find . -maxdepth 1 -name "*-update.json" | grep . || : > dummy-update.json

      - name: Commit Updated Build MD and Update JSON Files (Stable)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          skip_checkout: true
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.params_stable.outputs.version }}

      - name: Notify Telegram (Stable Build Complete)
        if: always() && steps.params_stable.outputs.enabled == 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          set -euo pipefail
          cd build || exit 1

          NL=$'\n'
          APKS=""
          MODULES=""
          HAS_MODULES=false

          for OUTPUT in *; do
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.params_stable.outputs.version }}/${OUTPUT}"
            if [[ $OUTPUT = *.apk ]]; then
              APKS+="${NL}${NL}[${OUTPUT}](${DL_URL})"
            elif [[ $OUTPUT = *.zip ]]; then
              MODULES+="${NL}${NL}[${OUTPUT}](${DL_URL})"
              HAS_MODULES=true
            fi
          done

          MODULES=${MODULES#"$NL"}
          APKS=${APKS#"$NL"}

          BODY="$(sed 's/^\* \*\*/↪ \*\*/g; s/^\* `/↪ \*\*/g; s/`/\*/g; s/^\* /\↪/g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../build.stable.tmp)"

          MSG="*Build No. ${{ steps.params_stable.outputs.version }}*${NL}${NL}${BODY}${NL}${NL}"

          if [ "$HAS_MODULES" = true ]; then
            MSG+="*Modules:*${MODULES}${NL}${NL}"
          fi

          MSG+="*APKs:*${APKS}"
          MSG=${MSG:0:9450}

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${{ steps.params_stable.outputs.thread_id }}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"

          sleep 1

          curl -X POST \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHANNEL}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"
