parallel-jobs = 1
# patches-version = "dev"
# cli-version = "dev"
enable-module-update = true

[icon-pack-studio-morphe]
enabled = true
app-name = "icon-pack-studio"
rv-brand = "morphe"
patches-source = "RookieEnough/De-ReVanced"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://icon-pack-studio.en.uptodown.com/android"

[smart-launcher-morphe]
enabled = true
app-name = "smart-launcher"
rv-brand = "morphe"
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://smart-launcher.en.uptodown.com/android"

[icon-packer-morphe]
enabled = true
app-name = "icon-packer"
rv-brand = "morphe"
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
archive-dlurl = "https://archive.org/download/geologically/apks/cn.ommiao.iconpacker"

[google-news-morphe]
enabled = true
app-name = "google-news"
rv-brand = "morphe"
arch = "both"
patches-source = "RookieEnough/De-ReVanced"
patcher-args = "--continue-on-error"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://google-play-newsstand.en.uptodown.com/android"




